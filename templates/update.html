<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Transmission | SecureChat</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --primary: #CFB08D;
            --dark-bg: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(207, 176, 141, 0.3);
            --text-main: #2c3e50;
            --text-dim: #7f8c8d;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .update-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 3rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(207, 176, 141, 0.1);
            border: 1px solid rgba(207, 176, 141, 0.2);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--primary);
            font-size: 2rem;
        }

        .header-text {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-text h3 {
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            display: block;
        }

        .form-control {
            background: #fbfbfb;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 18px;
            padding: 1.2rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(207, 176, 141, 0.2);
            color: var(--text-main);
        }

        .btn-update {
            background: var(--primary);
            color: var(--dark-bg);
            border: none;
            border-radius: 50px;
            padding: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.2);
            transition: all 0.3s;
        }

        .btn-update:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.4);
            background: #1ebe57;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .id-badge {
            background: rgba(134, 150, 160, 0.1);
            color: var(--text-dim);
            padding: 4px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="update-card">
        <div class="icon-box">
            <i class="fa-solid fa-code-merge"></i>
        </div>
        <div class="header-text">
            <h3>Modify Transmission</h3>
            <span class="id-badge">STREAM_ID: #{{message.id}}</span>
        </div>

        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-4">
                <label class="form-label">Identifier</label>
                {{ form.username(class="form-control", placeholder="Update identifier...", required=True) }}
            </div>

            <div class="mb-4">
                <label class="form-label">Data Payload</label>
                {{ form.message(class="form-control", rows="4", placeholder="Update message content...", required=True) }}
            </div>

            <button class="btn btn-update w-100">
                <i class="fa-solid fa-shield-check me-2"></i>Update Entry
            </button>

            <a href="/" class="back-link">
                <i class="fa-solid fa-arrow-left-long me-2"></i>Abort and Return
            </a>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
