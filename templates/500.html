<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Internal Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .error-container { max-width: 500px; padding: 2rem; }
        h1 { font-size: 4rem; color: #e74c3c; }
        a { display: inline-block; margin-top: 1rem; color: white; background: #CFB08D; padding: 0.5rem 1rem; border-radius: 5px; text-decoration: none;}
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500</h1>
        <h2>Internal Server Error</h2>
        <p class="text-muted">An unexpected error occurred. Please try again later.</p>
        <a href="/">Return Home</a>
    </div>
</body>
</html>
