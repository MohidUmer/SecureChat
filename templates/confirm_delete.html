<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Deletion | SecureChat</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --danger: #cf736d;
            /* Muted coral red for cream theme */
            --dark-bg: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(207, 176, 141, 0.3);
            --text-main: #2c3e50;
            --text-dim: #7f8c8d;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .delete-card {
            background: rgba(255, 95, 86, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 95, 86, 0.2);
            border-radius: 35px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 95, 86, 0.1);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.02);
            }

            50% {
                transform: scale(0.98);
            }
        }

        .warning-icon {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(255, 95, 86, 0.5);
        }

        .captcha-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .captcha-code {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 10px;
            color: var(--text-main);
            /* FIX: Was white */
            user-select: none;
            text-decoration: line-through;
            opacity: 0.8;
        }

        .form-control {
            background: #fbfbfb;
            border: 2px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .form-control:focus {
            border-color: var(--danger);
            background: rgba(207, 115, 109, 0.05);
            box-shadow: 0 0 20px rgba(207, 115, 109, 0.2);
            color: var(--text-main);
            /* FIX: Was white */
        }

        .btn-nuke {
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 1.2rem;
            font-weight: 800;
            width: 100%;
            margin-top: 1.5rem;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-nuke:hover {
            background: #ff3b30;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 95, 86, 0.4);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 1rem;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="delete-card">
        <i class="fa-solid fa-triangle-exclamation warning-icon"></i>
        <h3>Critical Action</h3>
        <p class="text-dim">You are about to permanently delete message <strong>#{{message.id}}</strong> from
            <strong>{{message.username}}</strong>. Once it's gone, it's really, really gone.
        </p>

        <div class="captcha-box">
            <label class="small text-dim d-block mb-2">VERIFICATION_CHALLENGE</label>
            <span class="captcha-code">{{code}}</span>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="text" name="security_code" class="form-control" placeholder="Enter code to confirm..."
                autocomplete="off" required autofocus>

            {% if error %}
            <div class="error-msg">
                <i class="fa-solid fa-circle-xmark me-2"></i>{{error}}
            </div>
            {% endif %}

            <button class="btn btn-nuke">
                <i class="fa-solid fa-skull-crossbones me-2"></i>Confirm Deletion
            </button>

            <a href="/" class="btn btn-link text-dim mt-3 text-decoration-none">
                <i class="fa-solid fa-arrow-left me-2"></i>Cancel Action
            </a>
        </form>
    </div>

</body>

</html>
